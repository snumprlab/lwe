# Selective LWE on VL-RewardBench via OpenRouter (Seed 2.0 Mini)

seed: 123
method: selective_lwe
temperature: 0.0

prompts:
  initial_meta_prompt: null
  vanilla_judge_prompt: null

lwe:
  restrict_length: true
  max_meta_prompt_length: 10000

model:
  model_type: openrouter
  model_name: bytedance-seed/seed-2.0-mini
  max_try: 3

dataset:
  name: vlrewardbench
  data_path: data/vlrewardbench/vlrewardbench_test.jsonl
  image_prefix: ""
  order_ids_path: null
  strict_order: false
  data_start_idx: null
  data_end_idx: null
  swap: false
  shuffle: true
  batch_size: 4

out_dir: runs
